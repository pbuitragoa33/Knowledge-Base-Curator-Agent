<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Curador de Conocimiento Asistido</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>Gestor de Subidas</h1>
                    <p>Inicia sesión para continuar</p>
                </div>

                {% if error %}
                    <div class="error-message">{{ error }}</div>
                {% endif %}

                <form method="POST" class="login-form">
                    <div class="form-group">
                        <label for="login">Usuario o Correo</label>
                        <input type="text" id="login" name="login" required placeholder="Ingresa tu usuario o correo">
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Inicia Sesión</button>
                </form>

                <div class="login-footer">
                    <div style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #ecf0f1;">
                        <p style="margin-bottom: 10px;">¿No tienes cuenta? <a href="{{ url_for('signup') }}" style="color: #3498db; font-weight: 500;">Créala aquí</a></p>
                    </div>
                    <p>Credenciales de demostración:</p>
                    <div class="credentials">
                        <div class="credential-item">
                            <strong>Admin:</strong>
                            <code>admin / admin123</code>
                        </div>
                        <div class="credential-item">
                            <strong>Profesor:</strong>
                            <code>profesor / prof123</code>
                        </div>
                        <div class="credential-item">
                            <strong>Estudiante:</strong>
                            <code>estudiante / est123</code>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
