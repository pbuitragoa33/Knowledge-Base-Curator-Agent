<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con el Agente - {{ course }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* ── Layout de página completa ───────────────────────────────────── */
        .container.chat-outer {
            height: calc(100vh - 40px); /* 2 × 20px de padding del body */
            display: flex;
            flex-direction: column;
        }

        .chat-outer .header-top {
            margin-bottom: 16px; /* reduce el 40px por defecto */
            flex-shrink: 0;
        }

        /* ── Tarjeta de chat ─────────────────────────────────────────────── */
        .chat-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0; /* necesario para que flex children puedan hacer scroll */
            overflow: hidden;
        }

        .chat-card-header {
            padding: 14px 24px;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .chat-card-header h2 {
            color: #333;
            font-size: 1.1em;
            margin: 0 0 2px 0;
        }

        .chat-card-header p {
            color: #999;
            font-size: 0.85em;
            margin: 0;
        }

        /* ── Área de mensajes ────────────────────────────────────────────── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
        .chat-messages::-webkit-scrollbar-thumb:hover { background: #667eea; }

        /* ── Estado vacío ────────────────────────────────────────────────── */
        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #bbb;
            gap: 10px;
            text-align: center;
            padding: 40px;
            pointer-events: none;
        }

        .chat-empty-icon { font-size: 3em; }

        /* ── Burbujas ────────────────────────────────────────────────────── */
        .bubble-row {
            display: flex;
            align-items: flex-end;
        }

        .bubble-row.user  { justify-content: flex-end; }
        .bubble-row.agent { justify-content: flex-start; }

        .bubble {
            max-width: 72%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 0.95em;
        }

        .bubble p {
            margin: 0;
            white-space: pre-wrap;
        }

        .bubble-user {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bubble-agent {
            background: #f0f0f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .bubble-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 3px solid #dc3545;
            border-bottom-left-radius: 4px;
        }

        /* ── Indicador de escritura ──────────────────────────────────────── */
        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 14px 18px;
            background: #f0f0f5;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            align-items: center;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #aaa;
            border-radius: 50%;
            animation: typingBounce 1.2s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0);    opacity: 0.5; }
            30%            { transform: translateY(-6px); opacity: 1;   }
        }

        /* ── Fuentes consultadas (colapsable) ────────────────────────────── */
        .sources-details {
            margin-top: 10px;
            font-size: 0.88em;
        }

        .sources-details summary {
            cursor: pointer;
            color: #667eea;
            font-weight: 700;
            user-select: none;
            list-style: none;
        }

        .sources-details summary::-webkit-details-marker { display: none; }
        .sources-details[open] summary { margin-bottom: 6px; }

        .sources-list {
            margin: 0;
            padding-left: 16px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .sources-list li {
            color: #555;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        /* ── Barra de input ──────────────────────────────────────────────── */
        .chat-input-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 14px 20px;
            border-top: 2px solid #f0f0f0;
            flex-shrink: 0;
            background: white;
        }

        .chat-input {
            flex: 1;
            padding: 11px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 1em;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .chat-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .chat-input:disabled {
            background: #f9f9f9;
            color: #aaa;
        }

        /* Anula width: 100% de .btn-primary y fija el radio */
        .chat-send-btn {
            width: auto;
            margin-top: 0;
            border-radius: 24px;
            padding: 11px 24px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="container chat-outer">
        <div class="header-top">
            <a href="{{ url_for('upload_page', course=course) }}" class="btn btn-secondary btn-small">← Volver al Curso</a>
            <h1>Chat con el Agente</h1>
            <div class="user-info">
                <span>👤 {{ session.get('user', 'Usuario') }}</span>
                <a href="/logout" class="btn btn-secondary btn-small">Cerrar Sesión</a>
            </div>
        </div>

        <div class="chat-card">
            <div class="chat-card-header">
                <h2>🤖 Agente de Curaduría — {{ course }}</h2>
                <p>Realiza preguntas sobre los documentos indexados del curso.</p>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="chat-empty" id="chatEmpty">
                    <span class="chat-empty-icon">💬</span>
                    <p>Escribe tu primera pregunta para comenzar.</p>
                </div>
            </div>

            <div class="chat-input-bar">
                <input
                    type="text"
                    id="chatInput"
                    class="chat-input"
                    placeholder="Escribe tu pregunta sobre los documentos del curso..."
                    autocomplete="off"
                />
                <button id="sendBtn" class="btn btn-primary chat-send-btn">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        const courseId       = {{ course_id }};
        const conversationId = crypto.randomUUID();
        const messagesEl     = document.getElementById('chatMessages');
        const chatInput      = document.getElementById('chatInput');
        const sendBtn        = document.getElementById('sendBtn');
        const chatEmpty      = document.getElementById('chatEmpty');

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function hideEmpty() {
            if (chatEmpty) chatEmpty.style.display = 'none';
        }

        function buildSourcesHtml(sources) {
            if (!Array.isArray(sources) || sources.length === 0) return '';
            const items = sources.map(s => `<li>${escapeHtml(s)}</li>`).join('');
            return `
                <details class="sources-details">
                    <summary>📄 Fuentes consultadas (${sources.length})</summary>
                    <ul class="sources-list">${items}</ul>
                </details>`;
        }

        function appendUserBubble(text) {
            hideEmpty();
            const row = document.createElement('div');
            row.className = 'bubble-row user';
            row.innerHTML = `<div class="bubble bubble-user"><p>${escapeHtml(text)}</p></div>`;
            messagesEl.appendChild(row);
            scrollToBottom();
        }

        function appendAgentBubble(text, sources) {
            hideEmpty();
            const row = document.createElement('div');
            row.className = 'bubble-row agent';
            row.innerHTML = `
                <div class="bubble bubble-agent">
                    <p>${escapeHtml(text)}</p>
                    ${buildSourcesHtml(sources)}
                </div>`;
            messagesEl.appendChild(row);
            scrollToBottom();
        }

        function appendErrorBubble(text) {
            hideEmpty();
            const row = document.createElement('div');
            row.className = 'bubble-row agent';
            row.innerHTML = `<div class="bubble bubble-error"><p>${escapeHtml(text)}</p></div>`;
            messagesEl.appendChild(row);
            scrollToBottom();
        }

        function showTyping() {
            hideEmpty();
            const row = document.createElement('div');
            row.className = 'bubble-row agent';
            row.id = 'typingIndicator';
            row.innerHTML = `
                <div class="typing-dots">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>`;
            messagesEl.appendChild(row);
            scrollToBottom();
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            chatInput.value    = '';
            chatInput.disabled = true;
            sendBtn.disabled   = true;

            appendUserBubble(text);
            showTyping();

            try {
                const response = await fetch('/api/agent/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message:         text,
                        course_id:       courseId,
                        conversation_id: conversationId,
                    }),
                });

                const data = await response.json();
                removeTyping();

                if (!response.ok) {
                    appendErrorBubble(`Error: ${data.error || 'No se pudo obtener respuesta del agente'}`);
                } else {
                    appendAgentBubble(data.response, data.sources || []);
                }
            } catch (error) {
                removeTyping();
                appendErrorBubble(`Error de conexión: ${escapeHtml(error.message)}`);
            } finally {
                chatInput.disabled = false;
                sendBtn.disabled   = false;
                chatInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        chatInput.focus();
    </script>
</body>
</html>
