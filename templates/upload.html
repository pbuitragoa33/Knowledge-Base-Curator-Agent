<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Documentos - {{ course }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header-top">
            <a href="/" class="btn btn-secondary btn-small">← Cambiar Curso</a>
            {% if session.get('role') in ['admin', 'profesor'] %}
            <a href="{{ url_for('chat_page', course=course) }}" class="btn btn-primary btn-small">💬 Chatear con el Agente</a>
            {% endif %}
            <h1>{{ course }}</h1>
            <div class="user-info">
                <span>👤 {{ session.get('user', 'Usuario') }}</span>
                <a href="/logout" class="btn btn-secondary btn-small">Cerrar Sesión</a>
            </div>
        </div>

        <div id="contentContainer"></div>
    </div>

    <!-- Modal para Historial -->
    <div id="historyModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Historial de Versiones</h2>
                <button class="modal-close" onclick="closeHistoryModal()">&times;</button>
            </div>
            <div id="historyBody" class="modal-body"></div>
        </div>
    </div>

    <!-- Modal para Diff -->
    <div id="diffModal" class="modal" style="display: none;">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2>Comparar Versiones</h2>
                <button class="modal-close" onclick="closeDiffModal()">&times;</button>
            </div>
            <div id="diffBody" class="modal-body"></div>
        </div>
    </div>

    <script>
        const role = '{{ session.get("role") }}';
        const course = '{{ course }}';
        const userName = '{{ session.get("user") }}';

        // Cargar interfaz según el rol
        if (role === 'admin' || role === 'profesor') {
            loadProfessorInterface();
        } else {
            loadStudentInterface();
        }

        async function loadProfessorInterface() {
            const container = document.getElementById('contentContainer');
            container.innerHTML = `
                <div class="content-grid">
                    <div class="card upload-card">
                        <h2>Subir Documentos del Curso</h2>
                        <div id="dropZone" class="drop-zone">
                            <div class="drop-zone-content">
                                <div class="drop-icon">📤</div>
                                <h3>Arrastra documentos aquí</h3>
                                <p>o haz clic para seleccionar</p>
                                <p class="drop-formats">Formatos permitidos: PDF, MD, DOCX, TXT</p>
                            </div>
                            <input type="file" id="fileInput" multiple accept=".pdf,.md,.docx,.txt" style="display: none;">
                        </div>
                        <div id="fileList" class="file-list" style="display: none;">
                            <h3>Archivos a subir:</h3>
                            <div id="selectedFiles"></div>
                            <button id="uploadBtn" class="btn btn-success">Subir Documentos</button>
                            <button id="clearBtn" class="btn btn-danger">Limpiar</button>
                        </div>
                        <div id="uploadProgress" class="upload-progress" style="display: none;">
                            <p>Subiendo documentos...</p>
                            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                        </div>
                        <div id="uploadMessage" class="upload-message"></div>
                    </div>
                    <div class="card documents-card">
                        <h2>Documentos del Curso</h2>
                        <div id="documentsContainer" class="documents-list">
                            <p class="loading">Cargando documentos...</p>
                        </div>
                    </div>
                </div>
                <div class="card comments-card">
                    <h2>Comentarios de Estudiantes</h2>
                    <div id="commentsContainer" class="comments-list">
                        <p class="loading">Cargando comentarios...</p>
                    </div>
                </div>
                <div class="card semantic-search-card">
                    <h2>Consulta Semántica del Curso</h2>
                    <p class="subtitle-sm">Busca información relevante dentro de los documentos indexados del curso actual.</p>
                    <div class="semantic-search-controls">
                        <textarea id="semanticQueryInput" class="form-textarea semantic-query-input" placeholder="Escribe tu pregunta en lenguaje natural..."></textarea>
                        <div class="semantic-search-actions">
                            <label for="semanticTopNSelect" class="semantic-topn-label">Top resultados</label>
                            <select id="semanticTopNSelect" class="form-select semantic-topn-select">
                                <option value="1">1</option>
                                <option value="3">3</option>
                                <option value="5" selected>5</option>
                                <option value="10">10</option>
                            </select>
                            <button id="semanticSearchBtn" class="btn btn-primary semantic-search-btn" type="button">Buscar</button>
                        </div>
                    </div>
                    <div id="semanticSearchMessage" class="message"></div>
                    <div id="semanticResultsContainer" class="semantic-results">
                        <p class="no-data">Realiza una consulta para ver resultados</p>
                    </div>
                </div>
            `;
            setupFileUpload();
            await loadDocuments();
            await loadAllComments();
            setupSemanticSearch();
        }

        async function loadStudentInterface() {
            const container = document.getElementById('contentContainer');
            container.innerHTML = `
                <div class="content-grid">
                    <div class="card documents-card">
                        <h2>Documentos del Curso</h2>
                        <div id="documentsContainer" class="documents-list">
                            <p class="loading">Cargando documentos...</p>
                        </div>
                    </div>
                    <div class="card comments-form-card">
                        <h2>Agregar Comentario</h2>
                        <div id="commentFormContainer"></div>
                    </div>
                </div>
                <div class="card semantic-search-card">
                    <h2>Consulta Semántica del Curso</h2>
                    <p class="subtitle-sm">Busca información relevante dentro de los documentos indexados del curso actual.</p>
                    <div class="semantic-search-controls">
                        <textarea id="semanticQueryInput" class="form-textarea semantic-query-input" placeholder="Escribe tu pregunta en lenguaje natural..."></textarea>
                        <div class="semantic-search-actions">
                            <label for="semanticTopNSelect" class="semantic-topn-label">Top resultados</label>
                            <select id="semanticTopNSelect" class="form-select semantic-topn-select">
                                <option value="1">1</option>
                                <option value="3">3</option>
                                <option value="5" selected>5</option>
                                <option value="10">10</option>
                            </select>
                            <button id="semanticSearchBtn" class="btn btn-primary semantic-search-btn" type="button">Buscar</button>
                        </div>
                    </div>
                    <div id="semanticSearchMessage" class="message"></div>
                    <div id="semanticResultsContainer" class="semantic-results">
                        <p class="no-data">Realiza una consulta para ver resultados</p>
                    </div>
                </div>
            `;
            await loadDocuments();
            setupCommentForm();
            setupSemanticSearch();
        }

        function setupFileUpload() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const fileList = document.getElementById('fileList');
            const selectedFiles = document.getElementById('selectedFiles');
            const uploadBtn = document.getElementById('uploadBtn');
            const clearBtn = document.getElementById('clearBtn');
            const uploadProgress = document.getElementById('uploadProgress');
            const uploadMessage = document.getElementById('uploadMessage');
            let files = [];

            dropZone.addEventListener('click', () => fileInput.click());
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
            dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
            dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
            fileInput.addEventListener('change', (e) => { handleFiles(e.target.files); });

            function handleFiles(newFiles) {
                files = Array.from(newFiles);
                if (files.length === 0) { fileList.style.display = 'none'; return; }
                selectedFiles.innerHTML = files.map((file, index) => `
                    <div class="file-item">
                        <span class="file-name">${file.name}</span>
                        <span class="file-size">${(file.size / 1024).toFixed(2)} KB</span>
                        <button class="btn-remove" onclick="removeFile(${index})">✕</button>
                    </div>
                `).join('');
                fileList.style.display = 'block';
                uploadMessage.innerHTML = '';
            }

            window.removeFile = function(index) {
                files.splice(index, 1);
                if (files.length === 0) { fileList.style.display = 'none'; } else { handleFiles(files); }
            };

            clearBtn.addEventListener('click', () => {
                files = [];
                fileList.style.display = 'none';
                fileInput.value = '';
                uploadMessage.innerHTML = '';
            });

            uploadBtn.addEventListener('click', async () => {
                if (files.length === 0) return;
                const formData = new FormData();
                files.forEach(file => { formData.append('files[]', file); });
                uploadProgress.style.display = 'block';
                uploadBtn.disabled = true;

                try {
                    const response = await fetch('/api/upload', { method: 'POST', body: formData });
                    const data = await response.json();
                    uploadProgress.style.display = 'none';

                    if (response.ok) {
                        uploadMessage.innerHTML = `
                            <div class="success-message">
                                <p>✓ ${data.files.length} documento(s) subido(s) exitosamente</p>
                                <p><strong>Hash global:</strong> ${data.upload_hash}</p>
                                <p><strong>Fecha:</strong> ${data.upload_date}</p>
                            </div>
                        `;
                        files = [];
                        fileList.style.display = 'none';
                        fileInput.value = '';
                        setTimeout(() => loadDocuments(), 1500);
                    } else {
                        uploadMessage.innerHTML = `<div class="error-message">Error: ${data.error}</div>`;
                    }
                } catch (error) {
                    uploadProgress.style.display = 'none';
                    uploadMessage.innerHTML = `<div class="error-message">Error: ${error.message}</div>`;
                } finally {
                    uploadBtn.disabled = false;
                }
            });
        }

        async function loadDocuments() {
            try {
                const response = await fetch(`/api/documents/${encodeURIComponent(course)}`);
                const documents = await response.json();
                const container = document.getElementById('documentsContainer');
                
                if (documents.length === 0) {
                    container.innerHTML = '<p class="no-data">No hay documentos en este curso aún</p>';
                    return;
                }

                if (role === 'admin' || role === 'profesor') {
                    container.innerHTML = documents.map(doc => `
                        <div class="document-item">
                            <div class="document-header">
                                <div>
                                    <p class="document-name">${doc.filename}</p>
                                    <p class="document-info">
                                        <span>Hash: <code>${doc.file_hash}</code></span>
                                        <span>Subido por: ${doc.uploaded_by}</span>
                                    </p>
                                    <p class="document-date">${doc.upload_date}</p>
                                </div>
                                <div class="document-actions">
                                    <button class="btn-icon" title="Ver historial" onclick="openHistoryModal('${doc.filename}', ${doc.id})">📋</button>
                                    <button class="btn-delete-doc" title="Eliminar" onclick="deleteDocument(${doc.id})">🗑️</button>
                                </div>
                            </div>
                            <div class="document-comments-preview" id="comments-${doc.id}">
                                <p class="loading">Cargando comentarios...</p>
                            </div>
                        </div>
                    `).join('');
                    documents.forEach(doc => loadDocumentComments(doc.id));
                } else {
                    container.innerHTML = documents.map(doc => `
                        <div class="document-item">
                            <div class="document-header">
                                <div>
                                    <p class="document-name">${doc.filename}</p>
                                    <p class="document-info">Hash: <code>${doc.file_hash}</code></p>
                                    <p class="document-date">${doc.upload_date}</p>
                                </div>
                                <div class="document-actions">
                                    <button class="btn-icon" title="Ver historial" onclick="openHistoryModal('${doc.filename}', ${doc.id})">📋</button>
                                    <button class="btn-icon" title="Descargar" onclick="downloadDocument(${doc.id})">⬇️</button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                document.getElementById('documentsContainer').innerHTML = `<p class="error-message">Error: ${error.message}</p>`;
            }
        }

        async function loadDocumentComments(docId) {
            try {
                const response = await fetch(`/api/comments/${docId}`);
                if (!response.ok) {
                    document.getElementById(`comments-${docId}`).innerHTML = '<p class="no-data">Sin comentarios</p>';
                    return;
                }
                const comments = await response.json();
                const container = document.getElementById(`comments-${docId}`);
                
                if (comments.length === 0) {
                    container.innerHTML = '<p class="no-data">Sin comentarios</p>';
                    return;
                }

                container.innerHTML = `
                    <div class="comments-list-preview">
                        ${comments.map(c => `
                            <div class="comment-item">
                                <p class="comment-author"><strong>${c.student_name}</strong></p>
                                <p class="comment-text">${c.comment_text}</p>
                                <p class="comment-date">${c.comment_date}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                console.error('Error loading comments:', error);
            }
        }

        async function loadAllComments() {
            try {
                const docsResponse = await fetch(`/api/documents/${encodeURIComponent(course)}`);
                const documents = await docsResponse.json();
                const container = document.getElementById('commentsContainer');
                
                if (documents.length === 0) {
                    container.innerHTML = '<p class="no-data">No hay documentos para mostrar comentarios</p>';
                    return;
                }

                let allComments = [];
                for (const doc of documents) {
                    try {
                        const response = await fetch(`/api/comments/${doc.id}`);
                        if (response.ok) {
                            const comments = await response.json();
                            allComments.push({ document: doc, comments: comments });
                        }
                    } catch (e) {
                        console.error('Error loading comments for doc', doc.id);
                    }
                }

                if (allComments.filter(x => x.comments.length > 0).length === 0) {
                    container.innerHTML = '<p class="no-data">No hay comentarios aún</p>';
                    return;
                }

                container.innerHTML = allComments.filter(x => x.comments.length > 0).map(item => `
                    <div class="document-comments-section">
                        <h3>${item.document.filename}</h3>
                        <div class="comments-list-full">
                            ${item.comments.map(c => `
                                <div class="comment-item-full">
                                    <p class="comment-author"><strong>${c.student_name}</strong></p>
                                    <p class="comment-text">${c.comment_text}</p>
                                    <p class="comment-date">${c.comment_date}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function escapeSemanticHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function setupSemanticSearch() {
            const searchBtn = document.getElementById('semanticSearchBtn');
            const queryInput = document.getElementById('semanticQueryInput');
            const topNSelect = document.getElementById('semanticTopNSelect');
            const resultsContainer = document.getElementById('semanticResultsContainer');
            const messageContainer = document.getElementById('semanticSearchMessage');

            if (!searchBtn || !queryInput || !topNSelect || !resultsContainer || !messageContainer) {
                return;
            }

            searchBtn.addEventListener('click', async () => {
                const queryText = queryInput.value.trim();
                const topN = parseInt(topNSelect.value, 10);

                if (!queryText) {
                    messageContainer.innerHTML = '<div class="error-message">Escribe una pregunta para consultar.</div>';
                    return;
                }

                messageContainer.innerHTML = '';
                resultsContainer.innerHTML = '<p class="loading">Buscando fragmentos relevantes...</p>';
                searchBtn.disabled = true;

                try {
                    const response = await fetch('/api/query', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            course: course,
                            query: queryText,
                            top_n: topN,
                        }),
                    });

                    const payload = await response.json();

                    if (!response.ok) {
                        messageContainer.innerHTML = `<div class="error-message">Error: ${escapeSemanticHtml(payload.error || 'No se pudo realizar la consulta')}</div>`;
                        resultsContainer.innerHTML = '<p class="no-data">No hay resultados para mostrar.</p>';
                        return;
                    }

                    const results = Array.isArray(payload.results) ? payload.results : [];

                    if (results.length === 0) {
                        resultsContainer.innerHTML = '<p class="no-data">No se encontraron fragmentos para esta consulta.</p>';
                        return;
                    }

                    resultsContainer.innerHTML = results.map((result, index) => {
                        const chunkText = String(result.chunk_text || '');
                        const score = Number(result.score || 0);
                        const filename = result.source && result.source.filename ? result.source.filename : 'Fuente desconocida';
                        const uploadDate = result.source && result.source.upload_date ? result.source.upload_date : 'Fecha no disponible';
                        const needsToggle = chunkText.length > 300;
                        const chunkId = `semanticChunk-${index}`;

                        return `
                            <article class="semantic-result-card">
                                <div class="semantic-result-header">
                                    <span class="semantic-rank">#${index + 1}</span>
                                    <span class="semantic-score">Score: ${score.toFixed(4)}</span>
                                </div>
                                <p class="semantic-source"><strong>Archivo:</strong> ${escapeSemanticHtml(filename)}</p>
                                <p class="semantic-source"><strong>Subido:</strong> ${escapeSemanticHtml(uploadDate)}</p>
                                <p id="${chunkId}" class="semantic-chunk-text ${needsToggle ? 'is-collapsed' : ''}">${escapeSemanticHtml(chunkText)}</p>
                                ${needsToggle ? `<button type="button" class="semantic-toggle-btn" onclick="toggleSemanticChunk('${chunkId}', this)">Ver más</button>` : ''}
                            </article>
                        `;
                    }).join('');
                } catch (error) {
                    messageContainer.innerHTML = `<div class="error-message">Error: ${escapeSemanticHtml(error.message)}</div>`;
                    resultsContainer.innerHTML = '<p class="no-data">No hay resultados para mostrar.</p>';
                } finally {
                    searchBtn.disabled = false;
                }
            });
        }

        window.toggleSemanticChunk = function(chunkElementId, button) {
            const chunkElement = document.getElementById(chunkElementId);

            if (!chunkElement || !button) {
                return;
            }

            const isCollapsed = chunkElement.classList.toggle('is-collapsed');
            button.textContent = isCollapsed ? 'Ver más' : 'Ver menos';
        };

        window.deleteDocument = async function(docId) {
            if (!confirm('¿Estás seguro de eliminar este documento?')) return;
            try {
                const response = await fetch(`/api/delete-document/${docId}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('Documento eliminado');
                    loadDocuments();
                    loadAllComments();
                } else {
                    const data = await response.json();
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.openHistoryModal = async function(filename, docId) {
            const modal = document.getElementById('historyModal');
            const body = document.getElementById('historyBody');
            body.innerHTML = '<p class="loading">Cargando historial...</p>';
            
            try {
                const response = await fetch(`/api/document-history/${filename}`);
                if (!response.ok) {
                    body.innerHTML = '<p class="error-message">Error al cargar historial</p>';
                    return;
                }

                const data = await response.json();
                const versions = data.versions;

                if (versions.length === 0) {
                    body.innerHTML = '<p class="no-data">No hay versiones disponibles</p>';
                } else {
                    body.innerHTML = `
                        <div class="versions-list">
                            ${versions.map((v, idx) => `
                                <div class="version-item">
                                    <div class="version-header">
                                        <span class="version-number">Versión ${v.version_number}</span>
                                        <span class="version-date">${v.upload_date}</span>
                                        <span class="version-author">${v.uploaded_by}</span>
                                    </div>
                                    <div class="version-actions">
                                        <button class="btn btn-sm btn-info" onclick="downloadVersion(${v.version_id})">Descargar</button>
                                        ${idx > 0 ? `<button class="btn btn-sm btn-warning" onclick="compareDiff(${docId}, ${v.version_number}, ${versions[idx-1].version_number})">Comparar</button>` : ''}
                                    </div>
                                    <p class="version-hash">Hash: <code>${v.file_hash}</code></p>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            } catch (error) {
                body.innerHTML = `<p class="error-message">Error: ${error.message}</p>`;
            }
            modal.style.display = 'block';
        };

        window.closeHistoryModal = function() {
            document.getElementById('historyModal').style.display = 'none';
        };

        window.closeDiffModal = function() {
            document.getElementById('diffModal').style.display = 'none';
        };

        window.compareDiff = async function(docId, v1, v2) {
            const modal = document.getElementById('diffModal');
            const body = document.getElementById('diffBody');
            body.innerHTML = '<p class="loading">Comparando versiones...</p>';
            
            try {
                const response = await fetch(`/api/document-diff/${docId}/${v1}/${v2}`);
                if (!response.ok) {
                    body.innerHTML = '<p class="error-message">Error al comparar versiones</p>';
                    return;
                }

                const data = await response.json();
                const diff = data.diff;

                body.innerHTML = `
                    <div class="diff-container">
                        <p class="diff-title">Comparación: Versión ${v1} vs Versión ${v2}</p>
                        <div class="diff-stats">
                            <div class="stat added">
                                <span class="stat-label">Líneas Añadidas:</span>
                                <span class="stat-value">${diff.added}</span>
                            </div>
                            <div class="stat removed">
                                <span class="stat-label">Líneas Eliminadas:</span>
                                <span class="stat-value">${diff.removed}</span>
                            </div>
                            <div class="stat same">
                                <span class="stat-label">Líneas Sin Cambio:</span>
                                <span class="stat-value">${diff.same}</span>
                            </div>
                            <div class="stat total">
                                <span class="stat-label">Total de Líneas:</span>
                                <span class="stat-value">${diff.total}</span>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                body.innerHTML = `<p class="error-message">Error: ${error.message}</p>`;
            }
            modal.style.display = 'block';
        };

        window.downloadDocument = async function(docId) {
            try {
                const response = await fetch(`/api/download/${docId}`);
                if (!response.ok) {
                    alert('Error al descargar archivo');
                    return;
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `document_${docId}`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.downloadVersion = async function(versionId) {
            try {
                const response = await fetch(`/api/download-version/${versionId}`);
                if (!response.ok) {
                    alert('Error al descargar archivo');
                    return;
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `version_${versionId}`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        function setupCommentForm() {
            const container = document.getElementById('commentFormContainer');
            container.innerHTML = `
                <div id="docSelector" style="display: none;">
                    <select id="documentSelect" class="form-select">
                        <option value="">Selecciona un documento...</option>
                    </select>
                    <textarea id="commentText" class="form-textarea" placeholder="Tu comentario..." maxlength="500"></textarea>
                    <p id="charCount" class="char-count">0/500</p>
                    <button id="submitComment" class="btn btn-success">Enviar Comentario</button>
                </div>
            `;
            loadDocumentsForComments();
        }

        async function loadDocumentsForComments() {
            try {
                const response = await fetch(`/api/documents/${encodeURIComponent(course)}`);
                const documents = await response.json();
                const select = document.getElementById('documentSelect');
                const docSelector = document.getElementById('docSelector');
                
                if (documents.length === 0) {
                    docSelector.innerHTML = '<p class="no-data">No hay documentos disponibles</p>';
                    return;
                }

                docSelector.style.display = 'block';
                documents.forEach(doc => {
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.textContent = doc.filename;
                    select.appendChild(option);
                });

                const commentText = document.getElementById('commentText');
                const charCount = document.getElementById('charCount');
                const submitBtn = document.getElementById('submitComment');

                commentText.addEventListener('input', () => {
                    charCount.textContent = `${commentText.value.length}/500`;
                });

                submitBtn.addEventListener('click', async () => {
                    const docId = select.value;
                    const text = commentText.value.trim();

                    if (!docId) {
                        alert('Por favor selecciona un documento');
                        return;
                    }

                    if (!text) {
                        alert('Por favor escribe un comentario');
                        return;
                    }

                    try {
                        const response = await fetch('/api/add-comment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ document_id: docId, comment_text: text })
                        });

                        if (response.ok) {
                            alert('Comentario enviado correctamente');
                            commentText.value = '';
                            charCount.textContent = '0/500';
                            select.value = '';
                        } else {
                            const data = await response.json();
                            alert('Error: ' + data.error);
                        }
                    } catch (error) {
                        alert('Error: ' + error.message);
                    }
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        window.onclick = function(event) {
            const historyModal = document.getElementById('historyModal');
            const diffModal = document.getElementById('diffModal');
            if (event.target === historyModal) { historyModal.style.display = 'none'; }
            if (event.target === diffModal) { diffModal.style.display = 'none'; }
        };
    </script>
</body>
</html>
